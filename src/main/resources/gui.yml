# gui.yml - Custom configurations for Auction House GUIs

# Modern Menu Configurations
menus:
  main:
    title: "<yellow>Auction House"
    rows: 6
    listing-slots: [1, 2, 3, 4, 5, 6, 7, 8, 10, 11, 12, 13, 14, 15, 16, 17, 19, 20, 21, 22, 23, 24, 25, 26, 28, 29, 30, 31, 32, 33, 34, 35, 37, 38, 39, 40, 41, 42, 43, 44]
    items:
      filler:
        material: "GRAY_STAINED_GLASS_PANE"
        name: " "
        lore: []
      previous-page:
        material: "ARROW"
        slot: 48
        name: "<reset><yellow><bold>Previous Page"
        lore: []
      next-page:
        material: "ARROW"
        slot: 50
        name: "<reset><yellow><bold>Next Page"
        lore: []
      search:
        material: "OAK_SIGN"
        slot: 46
        name: "<reset><yellow>Search"
        # lore is dynamically handled
      retrieve:
        material: "CHEST"
        slot: 53
        name: "<reset><gold>Retrieve Items"
        # lore is dynamically handled
      sort:
        material: "HOPPER"
        slot: 52
        name: "<reset><yellow><bold>Sort Options"
        # lore is dynamically handled
      view-own:
        material: "PLAYER_HEAD"
        slot: 49
        name: "<reset><yellow>View Your Listings"
        lore:
          - ""
          - "<yellow>Click to browse"
      sorts-scroll-up:
        material: "ARROW"
        slot: 0
        name: "<yellow>Scroll Sorts Up"
        lore:
          - ""
          - "<yellow>Click to scroll"
      sorts-scroll-down:
        material: "ARROW"
        slot: 45
        name: "<yellow>Scroll Sorts Down"
        lore:
          - ""
          - "<yellow>Click to scroll"

